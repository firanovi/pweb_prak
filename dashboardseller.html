<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SakaMadura Dashboard</title>
    <link rel="stylesheet" href="dashboardseller.css">
    <link rel="stylesheet" href="./hamburger.css">
    <link href="https://fonts.googleapis.com/css2?family=Handlee&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="main-wrapper">
        <aside class="sidebar">
            <div class="logo">SakaMadura</div>
            <nav>
                <div class="nav-item active" onclick="navigate('dashboard', this)">
                    <span class="icon">👤</span> Preview
                </div>
                <div class="nav-item" onclick="navigate('orders', this)">
                    <span class="icon">📋</span> Order
                </div>
                <div class="nav-item" onclick="navigate('product', this)">
                    <span class="icon">📦</span> Product
                </div>
                <div class="nav-item" onclick="navigate('analytics', this)">
                    <span class="icon">📊</span> Analytics
                </div>
            </nav>
        </aside>

        <div class="content-container">
            <header class="header">
                <div class="search-wrapper">
                    <input type="text" placeholder="Search">
                </div>
                <div class="user-meta">
                    <span class="notif-icon">🔔</span>

                    <!-- ▼ PROFILE PILL + DROPDOWN ▼ -->
                    <div class="profile-pill" id="profile-trigger" onclick="toggleProfileDropdown()">

                        <!-- Avatar inisial -->
                        <div class="avatar-initials" id="header-user-initial">??</div>

                        <!-- Nama & email -->
                        <div class="text">
                            <strong id="header-user-name">Loading...</strong>
                            <small id="header-user-email">-</small>
                        </div>

                        <!-- Panah -->
                        <span class="chevron" id="profile-chevron">▼</span>

                        <!-- Dropdown -->
                        <div class="profile-dropdown" id="profile-dropdown">
                            <div class="dropdown-header">
                                <div class="dd-name"  id="dropdown-user-name">-</div>
                                <div class="dd-email" id="dropdown-user-email">-</div>
                            </div>
                            <button class="dropdown-item" onclick="goToProfile()">
                                <span class="dd-icon">👤</span> Profil Saya
                            </button>
                            <button class="dropdown-item" onclick="goToSettings()">
                                <span class="dd-icon">⚙️</span> Pengaturan
                            </button>
                            <div class="dropdown-divider"></div>
                            <button class="dropdown-item logout" onclick="logout()">
                                <span class="dd-icon">🚪</span> Keluar
                            </button>
                        </div>
                    </div>
                    <!-- ▲ END PROFILE PILL ▲ -->
                </div>
            </header>

            <div id="render-target"></div>
        </div>
    </div>

    <footer class="footer-bar">
        <div class="footer-logo">SakaMadura</div>
        <div class="footer-link">Contact us</div>
    </footer>

    <!-- ============================================ -->
    <!-- MODAL: ADD NEW PRODUCT                       -->
    <!-- ============================================ -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Update Product</h2>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <form id="productForm">
                <div class="form-group">
                    <label for="p-name">Product Name</label>
                    <input type="text" id="p-name" placeholder="Masukkan nama produk" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="p-price">Price (Rp)</label>
                        <input type="number" id="p-price" placeholder="500000" required>
                    </div>
                    <div class="form-group">
                        <label for="p-stock">Stock</label>
                        <input type="number" id="p-stock" placeholder="10" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="p-type">Type</label>
                    <select id="p-type">
                        <option value="Clothes">Clothes</option>
                        <option value="Food">Food</option>
                        <option value="Accessory">Accessory</option>
                        <option value="Fashion">Fashion</option>
                        <option value="Makanan">Makanan</option>
                        <option value="Kerajinan">Kerajinan</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="p-image">Product Image</label>
                    <input type="file" id="p-image" accept="image/*">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-white" onclick="closeModal()">Cancel</button>
                    <button type="button" class="btn-blue" onclick="addNewProduct()">Add Product</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- MODAL: EDIT PRODUCT                          -->
    <!-- ============================================ -->
    <div id="editProductModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Product</h2>
                <span class="close-modal" onclick="closeEditModal()">&times;</span>
            </div>
            <form id="editProductForm" onsubmit="saveEditProduct(event)">
                <div class="form-group">
                    <label>Product ID</label>
                    <input type="text" id="edit-p-id-display" disabled>
                </div>
                <div class="form-group">
                    <label for="edit-p-name">Product Name</label>
                    <input type="text" id="edit-p-name" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-p-price">Price (Rp)</label>
                        <input type="number" id="edit-p-price" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-p-stock">Stock</label>
                        <input type="number" id="edit-p-stock" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-p-type">Type</label>
                        <select id="edit-p-type">
                            <option value="Clothes">Clothes</option>
                            <option value="Food">Food</option>
                            <option value="Accessory">Accessory</option>
                            <option value="Fashion">Fashion</option>
                            <option value="Makanan">Makanan</option>
                            <option value="Kerajinan">Kerajinan</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-p-status">Status</label>
                        <select id="edit-p-status">
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                            <option value="Pending">Pending</option>
                            <option value="On Sale">On Sale</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="edit-p-image">Product Image</label>
                    <input type="file" id="edit-p-image" accept="image/*">
                </div>
                <input type="hidden" id="edit-p-id-hidden">
                <div class="modal-actions">
                    <button type="button" class="btn-white" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn-blue">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="dashboardseller.js"></script>
</body>
</html>
