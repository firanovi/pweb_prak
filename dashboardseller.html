<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SakaMadura Dashboard</title>
    <link rel="stylesheet" href="dashboardseller.css">
    <link href="https://fonts.googleapis.com/css2?family=Handlee&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="main-wrapper">
        <aside class="sidebar">
            <div class="logo">SakaMadura</div>
            <nav>
                <div class="nav-item active" onclick="navigate('dashboard', this)">
                    <span class="icon">👤</span> Dashboard
                </div>
                <div class="nav-item" onclick="navigate('orders', this)">
                    <span class="icon">📋</span> Order
                </div>
                <div class="nav-item" onclick="navigate('product', this)">
                    <span class="icon">📦</span> Product
                </div>
                <div class="nav-item" onclick="navigate('analytics', this)">
                    <span class="icon">📊</span> Analytics
                </div>
            </nav>
        </aside>

        <div class="content-container">
            <header class="header">
                <div class="search-wrapper">
                    <input type="text" placeholder="Search">
                </div>
                <div class="user-meta">
                    <span class="notif-icon">🔔</span>
                    <div class="profile-pill">
                        <img src="https://i.pravatar.cc/40?img=12" alt="Jiwoo">
                        <div class="text">
                            <strong>Jiwoo</strong>
                            <small>jiwoooo@gmail.com</small>
                        </div>
                    </div>
                </div>
            </header>

            <div id="render-target">
                </div>
        </div>
    </div>

    <footer class="footer-bar">
        <div class="footer-logo">SakaMadura</div>
        <div class="footer-link">Contact us</div>
    </footer>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Product</h2>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <form id="productForm">
                <div class="form-group">
                    <label for="p-name">Product Name</label>
                    <input type="text" id="p-name" placeholder="Masukkan nama produk" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="p-id">Product ID</label>
                        <input type="text" id="p-id" placeholder="Contoh: D128" required>
                    </div>
                    <div class="form-group">
                        <label for="p-price">Price (Rp)</label>
                        <input type="number" id="p-price" placeholder="500000" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="p-stock">Stock</label>
                        <input type="number" id="p-stock" placeholder="10" required>
                    </div>
                    <div class="form-group">
                        <label for="p-type">Type</label>
                        <select id="p-type">
                            <option value="Clothes">Clothes</option>
                            <option value="Food">Food</option>
                            <option value="Accessory">Accessory</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="p-image">Product Image</label>
                    <input type="file" id="p-image" accept="image/*">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-white" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-blue">Add Product</button>
                </div>
            </form>
        </div>
    </div>

    <script src="dashboardseller.js"></script>
</body>
</html>
