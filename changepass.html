<!DOCTYPE html>

    <link rel="stylesheet" href="./changepass.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&display=swap" rel="stylesheet">

<body>
    <!-- Navbar -->

        <div class="nav-left">
            <a href="#" class="logo">SakaMadura</a>
            <div class="nav-links">
                <a href="./homepage.html" class="nav-link">About</a>
                <a href="#" class="nav-link">Heritage</a>
                <a href="#" class="nav-link">Shop</a>
            </div>
        </div>
        
        <div class="nav-right">
            <div class="search-box">
                <input type="text" placeholder="Search">
                <i class="fas fa-search"></i>
            </div>
            <a href="#" class="login-btn">Log in</a>
        </div>
        </nav>

     <!-- Main Container -->
    <div class="container">
        <!-- Password Card -->
        <div class="password-card">
            <h2 class="card-title">Change Password</h2>
            
            <form>
                <div class="form-group">
                    <label class="form-label">Password Lama</label>
                    <input type="password" class="form-input" placeholder="">
                </div>

                <div class="form-group">
                    <label class="form-label">Password Baru</label>
                    <input 
                        type="password" 
                        class="form-input" 
                        placeholder=""
                        required
                        minlength="8"
                        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}""
                    >
                    <p class="hint">*Minimal 8 karakter, huruf besar, kecil & angka</p>
                </div>

                <div class="form-group">
                    <label class="form-label">Password Baru</label>
                    <input 
                        type="password" 
                        class="form-input" 
                        placeholder=""
                    >
                </div>

                <div class="button-group">
                    <a href="./dashboarduser.html" class="btn btn-secondary">Kembali</a>
                    <button type="submit" class="btn btn-primary">Konfirmasi</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-bg">

            <div class="footer-right">
